openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Club Innogeeks trusted Express API — Razorpay, quiz scoring, role assignment, Cloudinary signing
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: payments
    description: Razorpay order creation and webhook
  - name: quiz
    description: Quiz delivery and scoring
  - name: recruitment
    description: Recruitment lifecycle — window, payments, Round1/Round2, role assignment
  - name: admin
    description: Core team admin operations
  - name: cloudinary
    description: Cloudinary upload signing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /payments/orders:
    post:
      operationId: createPaymentOrder
      tags: [payments]
      summary: Create a Razorpay order (idempotent)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /payments/webhook:
    post:
      operationId: razorpayWebhook
      tags: [payments]
      summary: Razorpay event webhook
      parameters:
        - in: header
          name: x-razorpay-signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"
        "400":
          $ref: "#/components/responses/ValidationError"

  /quiz/validate-email:
    post:
      operationId: validateQuizEmail
      tags: [quiz]
      summary: Validate a KIET email and return the quiz the applicant can take
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizEmailInput"
      responses:
        "200":
          description: Eligibility result with quiz metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizEligibility"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /quiz/{quizId}:
    get:
      operationId: getQuiz
      tags: [quiz]
      summary: Fetch published quiz questions (no correct answers)
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /quiz/{quizId}/submit:
    post:
      operationId: submitQuiz
      tags: [quiz]
      summary: Submit quiz answers — server-side scoring, one submission per email
      parameters:
        - in: path
          name: quizId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmitRequest"
      responses:
        "201":
          description: Submission recorded with score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizSubmitResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /recruitment/assign-role:
    post:
      operationId: assignMemberRole
      tags: [recruitment]
      summary: Atomically assign member role after Round2 (core_team only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "200":
          description: Role assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /recruitment/window:
    post:
      operationId: setRecruitmentWindow
      tags: [recruitment]
      summary: Open or close the recruitment window for an academic year (core_team only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecruitmentWindowRequest"
      responses:
        "200":
          description: Window state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruitmentWindowResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /recruitment/approve-cash:
    post:
      operationId: approveCashPayment
      tags: [recruitment]
      summary: Approve a cash payment application (coordinator/core_team, domain-gated)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveCashRequest"
      responses:
        "200":
          description: Cash payment approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /recruitment/review-round2:
    post:
      operationId: reviewRound2
      tags: [recruitment]
      summary: Record Round 2 interview outcome (coordinator/core_team, domain-gated)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRound2Request"
      responses:
        "200":
          description: Round 2 review recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewRound2Response"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /admin/set-role:
    post:
      operationId: setUserRole
      tags: [admin]
      summary: Change any user's role and domain with audit log (core_team only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetRoleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /cloudinary/sign:
    post:
      operationId: signCloudinaryUpload
      tags: [cloudinary]
      summary: Generate a signed upload signature for Cloudinary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudinarySignRequest"
      responses:
        "200":
          description: Upload signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudinarySignResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict — duplicate or invalid state transition
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: External service not configured
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    WebhookAck:
      type: object
      properties:
        received:
          type: boolean
      required: [received]

    CreateOrderRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        amountPaise:
          type: integer
          minimum: 100
          description: Amount in paise (INR × 100)
        idempotencyKey:
          type: string
          minLength: 1
          maxLength: 64
      required: [applicationId, amountPaise, idempotencyKey]

    CreateOrderResponse:
      type: object
      properties:
        orderId:
          type: string
        idempotent:
          type: boolean
      required: [orderId]

    QuizEmailInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    QuizEligibility:
      type: object
      properties:
        canTake:
          type: boolean
        alreadySubmitted:
          type: boolean
        applicationId:
          type: string
          format: uuid
        applicantName:
          type: string
        quizId:
          type: string
          format: uuid
        quizTitle:
          type: string
        quizDescription:
          type: string
          nullable: true
        timeLimitSeconds:
          type: integer
          nullable: true
        questionCount:
          type: integer
        passingScore:
          type: integer
        result:
          type: object
          nullable: true
          properties:
            score:
              type: integer
            total:
              type: integer
            passed:
              type: boolean
          required: [score, total, passed]
      required:
        [
          canTake,
          alreadySubmitted,
          applicationId,
          applicantName,
          quizId,
          quizTitle,
          questionCount,
          passingScore,
        ]

    QuizQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question_text:
          type: string
        options:
          type: array
          items:
            type: string
        marks:
          type: integer
        order_index:
          type: integer
      required: [id, question_text, options, marks, order_index]

    QuizResponse:
      type: object
      properties:
        quiz:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            description:
              type: string
              nullable: true
            domain:
              type: string
              nullable: true
            academic_year:
              type: string
              nullable: true
            time_limit_seconds:
              type: integer
              nullable: true
          required: [id, title]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required: [quiz, questions]

    QuizSubmitRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        applicationId:
          type: string
          format: uuid
        answers:
          type: object
          additionalProperties:
            type: integer
          description: Map of questionId to selected option index
      required: [email, applicationId, answers]

    QuizSubmitResponse:
      type: object
      properties:
        score:
          type: integer
        total:
          type: integer
        passed:
          type: boolean
      required: [score, total, passed]

    AssignRoleRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
      required: [applicationId]

    CloudinarySignRequest:
      type: object
      properties:
        folder:
          type: string
          minLength: 1
        publicId:
          type: string
        eager:
          type: string
      required: [folder]

    CloudinarySignResponse:
      type: object
      properties:
        signature:
          type: string
        timestamp:
          type: integer
        apiKey:
          type: string
        cloudName:
          type: string
        folder:
          type: string
      required: [signature, timestamp, apiKey, cloudName, folder]

    RecruitmentWindowRequest:
      type: object
      properties:
        action:
          type: string
          enum: [open, close]
        academicYear:
          type: string
          minLength: 1
      required: [action, academicYear]

    RecruitmentWindowResponse:
      type: object
      properties:
        success:
          type: boolean
        isOpen:
          type: boolean
      required: [success, isOpen]

    ApproveCashRequest:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
      required: [applicationId]

    ReviewRound2Request:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [cleared, failed]
        score:
          type: object
          additionalProperties:
            type: number
          description: Rubric scores keyed by criterion name
        notes:
          type: string
          maxLength: 2000
      required: [applicationId, outcome]

    ReviewRound2Response:
      type: object
      properties:
        success:
          type: boolean
        newStatus:
          type: string
      required: [success, newStatus]

    SetRoleRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [public, member, coordinator, core_team]
        domain:
          type: string
          enum: [android, web, ml, iot, arvr]
          nullable: true
        reason:
          type: string
          maxLength: 500
      required: [userId, role]

    SetRoleResponse:
      type: object
      properties:
        success:
          type: boolean
        userId:
          type: string
          format: uuid
        role:
          type: string
        domain:
          type: string
          nullable: true
      required: [success, userId, role]
